<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Arb Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #0f1117; font-family: 'Inter', system-ui, sans-serif; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen">
    <!-- Nav -->
    <nav class="border-b border-gray-800 bg-gray-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <h1 class="text-lg font-bold text-white tracking-tight">
                    <span class="text-purple-400">Poly</span>Arb Bot
                </h1>
                <div class="flex gap-4 text-sm">
                    <a href="/" class="hover:text-white transition {% block nav_dashboard %}{% endblock %}">Dashboard</a>
                    <a href="/trades" class="hover:text-white transition {% block nav_trades %}{% endblock %}">Trades</a>
                    <a href="/settings" class="hover:text-white transition {% block nav_settings %}{% endblock %}">Settings</a>
                </div>
            </div>
            <div class="flex items-center gap-2 text-xs text-gray-500">
                <span id="sse-status" class="pulse-dot w-2 h-2 rounded-full bg-green-500 inline-block"></span>
                <span>PAPER TRADING</span>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- SSE Connection -->
    <script>
        const evtSource = new EventSource('/api/stream');

        evtSource.onopen = () => {
            document.getElementById('sse-status').classList.remove('bg-red-500');
            document.getElementById('sse-status').classList.add('bg-green-500');
        };

        evtSource.onerror = () => {
            document.getElementById('sse-status').classList.remove('bg-green-500');
            document.getElementById('sse-status').classList.add('bg-red-500');
        };

        // Auto-refresh des sections via HTMX polling
        evtSource.addEventListener('price_update', () => {
            htmx.trigger('#pairs-section', 'sse-refresh');
        });

        evtSource.addEventListener('opportunity_detected', () => {
            htmx.trigger('#opps-section', 'sse-refresh');
        });

        evtSource.addEventListener('trade_opened', () => {
            htmx.trigger('#positions-section', 'sse-refresh');
            htmx.trigger('#metrics-section', 'sse-refresh');
        });

        evtSource.addEventListener('trade_resolved', () => {
            htmx.trigger('#positions-section', 'sse-refresh');
            htmx.trigger('#metrics-section', 'sse-refresh');
            if (typeof refreshPnlChart === 'function') refreshPnlChart();
        });

        evtSource.addEventListener('portfolio_update', () => {
            htmx.trigger('#metrics-section', 'sse-refresh');
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
